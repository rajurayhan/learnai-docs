<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- brain circuit dots -->
  <circle cx="20" cy="22" r="3" fill="url(#text-grad)" opacity="0.9"/>
  <circle cx="32" cy="16" r="3" fill="url(#text-grad)" opacity="0.9"/>
  <circle cx="44" cy="22" r="3" fill="url(#text-grad)" opacity="0.9"/>
  <circle cx="44" cy="36" r="3" fill="url(#text-grad)" opacity="0.9"/>
  <circle cx="32" cy="42" r="3" fill="url(#text-grad)" opacity="0.9"/>
  <circle cx="20" cy="36" r="3" fill="url(#text-grad)" opacity="0.9"/>
  <!-- connecting lines -->
  <line x1="20" y1="22" x2="32" y2="16" stroke="url(#text-grad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="16" x2="44" y2="22" stroke="url(#text-grad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="44" y1="22" x2="44" y2="36" stroke="url(#text-grad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="44" y1="36" x2="32" y2="42" stroke="url(#text-grad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="42" x2="20" y2="36" stroke="url(#text-grad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="36" x2="20" y2="22" stroke="url(#text-grad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="22" x2="44" y2="36" stroke="url(#text-grad)" stroke-width="1" opacity="0.3"/>
  <line x1="44" y1="22" x2="20" y2="36" stroke="url(#text-grad)" stroke-width="1" opacity="0.3"/>
  <line x1="32" y1="16" x2="32" y2="42" stroke="url(#text-grad)" stroke-width="1" opacity="0.3"/>
  <!-- center node -->
  <circle cx="32" cy="29" r="4" fill="white" opacity="0.9"/>
  <!-- "L" label -->
  <text x="32" y="58" font-family="system-ui,sans-serif" font-size="7" font-weight="900" fill="white" text-anchor="middle" opacity="0.85">LearnAI</text>
</svg>
